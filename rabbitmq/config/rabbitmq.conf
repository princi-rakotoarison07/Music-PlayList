# =====================================================================
# FICHIER DE CONFIGURATION AVANCÉ - rabbitmq.conf
# =====================================================================

# 1. Gestion des ressources (Sécurité pour éviter que RabbitMQ ne crash votre PC)
# Bloque les producteurs si RabbitMQ utilise plus de 40% de la RAM disponible
vm_memory_high_watermark.relative = 0.4

# Bloque les producteurs s'il reste moins de 2 Go d'espace disque
disk_free_limit.absolute = 2GB

# 2. Sécurité & Accès
# Permet à l'utilisateur 'guest' de se connecter uniquement depuis localhost (par défaut)
loopback_users.guest = true

# 3. Réglages des connexions
# Temps max d'inactivité avant de couper une connexion (en secondes)
heartbeat = 60

# Limite maximale de connexions simultanées
max_connections = 1024